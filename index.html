<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const stadiumId = urlParams.get('id');

        if (!stadiumId) {
            // إذا لم يوجد معرف، نذهب للتسجيل فوراً
            window.location.replace("register.html");
        } else {
            // إذا وجد المعرف، ننتقل لصفحة الحجز بالمعلومات الصحيحة
            window.location.replace("booking.html?id=" + stadiumId);
        }
    </script>

    <style>
        body { font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f8fafc; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e3a8a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
