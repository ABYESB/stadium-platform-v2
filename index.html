<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري توجيهك...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const stadiumId = urlParams.get('id');

        // منطق التوجيه الجذري
        if (!stadiumId) {
            // لا يوجد ملعب محدد؟ اذهب لإنشاء ملعب جديد
            window.location.replace("register.html");
        } else {
            // يوجد معرف؟ اذهب لصفحة الحجز مباشرة
            window.location.replace("booking.html?id=" + stadiumId);
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f1f5f9; }
        .loader { border: 5px solid #e2e8f0; border-top: 5px solid #1e3a8a; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
