<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة ملاعب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #10b981;
            --bg-color: #f8fafc;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        .logo span { color: var(--secondary-color); }
        h2 { margin-bottom: 1.5rem; color: #1e293b; }
        
        .form-group {
            text-align: right;
            margin-bottom: 1.2rem;
        }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus { border-color: var(--primary-color); outline: none; }
        
        .hint { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
        
        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #1d4ed8; }
        
        .footer-links { margin-top: 1.5rem; font-size: 0.9rem; }
        .footer-links a { color: var(--primary-color); text-decoration: none; }

        #otpModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 2rem; border-radius: 12px; text-align: center;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="logo">ملاعب<span>.net</span></div>
    <h2>إنشاء حساب جديد</h2>
    
    <form id="registerForm">
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="fullName" placeholder="أدخل اسمك" required>
        </div>
        
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="********" required>
        </div>
        
        <div class="form-group">
            <label>اسم الملعب أو الجمعية</label>
            <input type="text" id="stadiumName" placeholder="مثلاً: ملعب السعادة" required>
            <p class="hint">يمكنك تغيير هذا لاحقاً من الإعدادات</p>
        </div>
        
        <button type="button" class="btn-submit" onclick="showOTP()">متابعة لإنشاء الحساب</button>
    </form>

    <div class="footer-links">
        لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
    </div>
</div>

<div id="otpModal">
    <div class="modal-content">
        <h3>تأكيد البريد الإلكتروني</h3>
        <p>لقد أرسلنا رمزاً إلى بريدك، أدخله هنا:</p>
        <input type="text" id="otpCode" placeholder="- - - -" style="text-align: center; letter-spacing: 10px; font-size: 1.5rem;">
        <br><br>
        <button class="btn-submit" onclick="verifyOTP()">تأكيد ودخول</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxVCziy2CPlkTrRzOgrGSQPxJk_7FEOyrLhiKWszZrEafe5ukyapyhrKrm3pREbaNkK/exec';

  
    let generatedOTP = ""; // لتخزين الرمز مؤقتاً

    async function showOTP() {
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const stadiumName = document.getElementById('stadiumName').value;

        if (!fullName || !email || !stadiumName) {
            alert("يرجى ملء جميع الخانات");
            return;
        }

        const btn = document.querySelector('.btn-submit');
        btn.innerText = "جاري إرسال الرمز...";
        btn.disabled = true;

        // الخطوة 1: طلب الرمز من جوجل سكريبت دون حفظ البيانات
        try {
            const response = await fetch(`${scriptURL}?action=sendOTP&email=${encodeURIComponent(email)}`);
            const result = await response.text();
            
            if (result === "Error") {
                alert("فشل إرسال الإيميل. تأكد من صحة البريد.");
            } else {
                generatedOTP = result.trim(); // حفظ الرمز للمقارنة لاحقاً
                document.getElementById('otpModal').style.display = 'flex';
            }
        } catch (e) {
            alert("خطأ في الاتصال بالسيرفر.");
        } finally {
            btn.innerText = "متابعة لإنشاء الحساب";
            btn.disabled = false;
        }
    }

    async function verifyOTP() {
        const userOTP = document.getElementById('otpCode').value;
        const btn = document.querySelector('#otpModal .btn-submit');

        // المقارنة: هل الرمز الذي أدخله المستخدم هو نفس الذي ولده السكريبت؟
        if (userOTP !== generatedOTP) {
            alert("الرمز غير صحيح، حاول مجدداً.");
            return;
        }

        btn.innerText = "جاري الحفظ النهائي...";
        btn.disabled = true;

        // الخطوة 2: إذا كان الرمز صحيحاً، نرسل أمر الحفظ للشيت
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const stadiumName = document.getElementById('stadiumName').value;

        const finalURL = `${scriptURL}?action=saveData&fullName=${encodeURIComponent(fullName)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&stadiumName=${encodeURIComponent(stadiumName)}&otp=${userOTP}`;

        fetch(finalURL, { method: 'GET', mode: 'no-cors' })
        .then(() => {
            const slug = stadiumName.toLowerCase().replace(/ /g, "-").replace(/[^\w-]+/g, "");
            alert("تم تفعيل حسابك بنجاح!");
            window.location.href = "index.html?id=" + slug;
        })
        .catch(() => alert("حدث خطأ أثناء الحفظ."));
    }
</script>
</body>
</html>
